<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏁 سباق الوصول إلى خط النهاية – أونلاين + صوت</title>

    <style>
        @import url("https://fonts.googleapis.com/css?family=Press+Start+2P");
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: "Press Start 2P", cursive;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }
        canvas.game { display: block; width: 100vw; height: 100vh; background: #2d4059; }

        #controls {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; pointer-events: none; z-index: 10;
        }
        #controls>div {
            pointer-events: auto;
            display: grid;
            grid-template-columns: 55px 55px 55px;
            gap: 8px;
        }
        #controls button {
            width: 100%; height: 50px;
            background: rgba(255,255,255,0.9);
            border: 2px solid #555; border-radius: 10px;
            box-shadow: 0 4px 0 #555;
            font-size: 22px; font-weight: bold;
            cursor: pointer; touch-action: manipulation;
            transition: 0.05s linear;
        }
        #controls button:active { transform: translateY(4px); box-shadow: none; }
        #controls button:first-of-type { grid-column: 1 / -1; }

        #score {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.8em; color: #fff;
            text-shadow: 2px 2px 0 #000; z-index: 10;
            pointer-events: none;
        }
        #finishLineIndicator {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 1.2em; color: #ffd700;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.6);
            padding: 6px 20px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
            100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
        }

        #result-container {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            visibility: hidden; z-index: 50;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
        }
        #result-container #result {
            display: flex; flex-direction: column;
            align-items: center; background: white;
            padding: 30px 50px; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center; max-width: 90%;
        }
        #result-container h1 { margin-bottom: 10px; }
        #result-container .winner-msg { color: #2e7d32; }
        #result-container .loser-msg { color: #c62828; }
        #result-container button {
            background: #0f3460; border: none;
            padding: 15px 40px; font-family: inherit;
            font-size: 1.2rem; color: white;
            border-radius: 50px; cursor: pointer;
            transition: 0.2s; margin-top: 10px;
        }
        #result-container button:hover { transform: scale(1.05); background: #1a4f8b; }

        #connection-panel {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 18px 22px; border-radius: 16px;
            color: white; font-size: 13px; z-index: 30;
            min-width: 210px; display: flex; flex-direction: column;
            gap: 10px; border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            font-family: "Segoe UI", Arial, sans-serif;
            transition: 0.3s;
        }
        #connection-panel.hidden { display: none; }
        #connection-panel .panel-header {
            display: flex; justify-content: space-between; align-items: center;
        }
        #connection-panel .panel-header button {
            background: none; border: none; color: #fff;
            font-size: 20px; cursor: pointer; padding: 0 6px; opacity: 0.7;
        }
        #connection-panel .panel-header button:hover { opacity: 1; }
        #connection-panel input {
            padding: 8px 12px; border-radius: 8px; border: none;
            outline: none; font-size: 14px; width: 100%;
            background: #2d4059; color: white;
        }
        #connection-panel .btn-row { display: flex; gap: 8px; }
        #connection-panel button {
            background: #0f3460; border: none;
            padding: 10px 16px; border-radius: 30px;
            color: white; font-weight: bold; cursor: pointer;
            transition: 0.2s; flex: 1; font-size: 13px;
            white-space: nowrap;
        }
        #connection-panel button:hover:not(:disabled) { background: #1a4f8b; transform: scale(1.02); }
        #connection-panel button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        #connection-panel .status { font-size: 12px; color: #a8d8ea; min-height: 20px; word-break: break-all; }
        #connection-panel .mic-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        #connection-panel .mic-row button { flex: 2; background: #2e7d32; }
        #connection-panel .mic-row button.muted { background: #c62828; }
        .mic-indicator {
            display: inline-block; width: 10px; height: 10px;
            border-radius: 50%; background: #4caf50;
            margin-left: 6px; transition: 0.3s;
        }
        .mic-indicator.off { background: #888; }

        #showPanelBtn {
            position: absolute; top: 20px; right: 20px;
            z-index: 35; background: rgba(0,0,0,0.7);
            border: 1px solid #555; color: white;
            padding: 8px 14px; border-radius: 30px;
            cursor: pointer; font-size: 14px; display: none;
            font-family: "Segoe UI", Arial, sans-serif;
        }
        #showPanelBtn:hover { background: #1a4f8b; }

        @media (max-width: 700px) {
            #connection-panel { top: 10px; right: 10px; padding: 12px 14px; min-width: 160px; font-size: 11px; }
            #score { font-size: 1.2em; top: 12px; left: 12px; }
            #finishLineIndicator { font-size: 0.9em; top: 12px; padding: 4px 12px; }
            #controls button { height: 44px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <canvas class="game" id="gameCanvas"></canvas>

    <div id="score">0</div>
    <div id="finishLineIndicator">🏁 خط النهاية (60)</div>

    <div id="controls">
        <div>
            <button id="forward">▲</button>
            <button id="left">◀</button>
            <button id="backward">▼</button>
            <button id="right">▶</button>
        </div>
    </div>

    <div id="result-container">
        <div id="result">
            <h1 id="resultTitle">🏁 انتهى السباق!</h1>
            <p id="resultMsg"></p>
            <button id="retry">🔄 العب مجدداً</button>
        </div>
    </div>

    <div id="connection-panel">
        <div class="panel-header">
            <span>🔗 الاتصال</span>
            <button id="closePanelBtn">✕</button>
        </div>
        <button id="createRoomBtn">🚀 إنشاء غرفة</button>
        <div class="btn-row">
            <input type="text" id="roomInput" placeholder="معرف الغرفة" />
            <button id="joinRoomBtn">انضم</button>
        </div>
        <div class="status" id="statusMsg">⏳ جاهز...</div>
        <div class="mic-row">
            <button id="micToggleBtn">🎤 تفعيل الميكروفون</button>
            <span class="mic-indicator" id="micIndicator"></span>
        </div>
        <div id="roleDisplay"><span id="role-badge" style="display:inline-block;padding:4px 14px;border-radius:30px;background:#777;color:#fff;">⏳ انتظر</span></div>
    </div>

    <button id="showPanelBtn">🔗 إظهار لوحة الاتصال</button>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://esm.sh/three@0.163.0" } }
    </script>

    <script type="module">
        // ============================================================
        // 1. استيرادات Three.js
        // ============================================================
        import * as THREE from "three";

        // ============================================================
        // 2. الثوابت
        // ============================================================
        const minTileIndex = -8;
        const maxTileIndex = 8;
        const tilesPerRow = maxTileIndex - minTileIndex + 1;
        const tileSize = 42;
        const FINISH_LINE_ROW = 60; // خط النهاية عند الصف 60

        function randomElement(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // ============================================================
        // 3. إدارة الصوت (Web Audio API)
        // ============================================================
        class SoundManager {
            constructor() {
                this.ctx = null;
                this.enabled = true;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (_) { this.enabled = false; }
            }

            playTone(freq, duration, type = 'sine', volume = 0.15) {
                if (!this.enabled || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.value = volume;
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch (_) {}
            }

            stepSound() {
                this.playTone(600 + Math.random() * 200, 0.06, 'sine', 0.1);
            }
            winSound() {
                [523, 659, 784, 1047].forEach((f, i) => {
                    setTimeout(() => this.playTone(f, 0.2, 'sine', 0.15), i * 120);
                });
            }
            loseSound() {
                [400, 350, 300, 250].forEach((f, i) => {
                    setTimeout(() => this.playTone(f, 0.25, 'sawtooth', 0.1), i * 150);
                });
            }
            crashSound() {
                this.playTone(120, 0.3, 'sawtooth', 0.12);
                this.playTone(80, 0.4, 'square', 0.08);
            }
        }

        const sounds = new SoundManager();

        // ============================================================
        // 4. دوال الرسم والكائنات (مع دعم خط النهاية)
        // ============================================================
        function Camera() {
            const size = 300;
            const viewRatio = window.innerWidth / window.innerHeight;
            const width = viewRatio < 1 ? size : size * viewRatio;
            const height = viewRatio < 1 ? size / viewRatio : size;
            const camera = new THREE.OrthographicCamera(
                width / -2, width / 2,
                height / 2, height / -2,
                100, 900
            );
            camera.up.set(0, 0, 1);
            camera.position.set(300, -300, 300);
            camera.lookAt(0, 0, 0);
            return camera;
        }

        function Texture(width, height, rects) {
            const canvas = document.createElement("canvas");
            canvas.width = width; canvas.height = height;
            const context = canvas.getContext("2d");
            context.fillStyle = "#ffffff";
            context.fillRect(0, 0, width, height);
            context.fillStyle = "rgba(0,0,0,0.6)";
            rects.forEach((rect) => context.fillRect(rect.x, rect.y, rect.w, rect.h));
            return new THREE.CanvasTexture(canvas);
        }

        const carFrontTexture = new Texture(40, 80, [{ x: 0, y: 10, w: 30, h: 60 }]);
        const carBackTexture = new Texture(40, 80, [{ x: 10, y: 10, w: 30, h: 60 }]);
        const carRightSideTexture = new Texture(110, 40, [
            { x: 10, y: 0, w: 50, h: 30 },
            { x: 70, y: 0, w: 30, h: 30 },
        ]);
        const carLeftSideTexture = new Texture(110, 40, [
            { x: 10, y: 10, w: 50, h: 30 },
            { x: 70, y: 10, w: 30, h: 30 },
        ]);
        const truckFrontTexture = new Texture(30, 30, [{ x: 5, y: 0, w: 10, h: 30 }]);
        const truckRightSideTexture = new Texture(25, 30, [{ x: 15, y: 5, w: 10, h: 10 }]);
        const truckLeftSideTexture = new Texture(25, 30, [{ x: 15, y: 15, w: 10, h: 10 }]);

        function Wheel(x) {
            const w = new THREE.Mesh(
                new THREE.BoxGeometry(12, 33, 12),
                new THREE.MeshLambertMaterial({ color: 0x333333, flatShading: true })
            );
            w.position.x = x; w.position.z = 6; return w;
        }

        function Car(initialTileIndex, direction, color) {
            const car = new THREE.Group();
            car.position.x = initialTileIndex * tileSize;
            if (!direction) car.rotation.z = Math.PI;
            const main = new THREE.Mesh(
                new THREE.BoxGeometry(60, 30, 15),
                new THREE.MeshLambertMaterial({ color, flatShading: true })
            );
            main.position.z = 12; main.castShadow = true; main.receiveShadow = true;
            car.add(main);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(33, 24, 12), [
                new THREE.MeshPhongMaterial({ color: 0xcccccc, flatShading: true, map: carBackTexture }),
                new THREE.MeshPhongMaterial({ color: 0xcccccc, flatShading: true, map: carFrontTexture }),
                new THREE.MeshPhongMaterial({ color: 0xcccccc, flatShading: true, map: carRightSideTexture }),
                new THREE.MeshPhongMaterial({ color: 0xcccccc, flatShading: true, map: carLeftSideTexture }),
                new THREE.MeshPhongMaterial({ color: 0xcccccc, flatShading: true }),
                new THREE.MeshPhongMaterial({ color: 0xcccccc, flatShading: true }),
            ]);
            cabin.position.x = -6; cabin.position.z = 25.5;
            cabin.castShadow = true; cabin.receiveShadow = true;
            car.add(cabin);
            car.add(Wheel(18)); car.add(Wheel(-18));
            return car;
        }

        function Truck(initialTileIndex, direction, color) {
            const truck = new THREE.Group();
            truck.position.x = initialTileIndex * tileSize;
            if (!direction) truck.rotation.z = Math.PI;
            const cargo = new THREE.Mesh(
                new THREE.BoxGeometry(70, 35, 35),
                new THREE.MeshLambertMaterial({ color: 0xb4c6fc, flatShading: true })
            );
            cargo.position.x = -15; cargo.position.z = 25;
            cargo.castShadow = true; cargo.receiveShadow = true;
            truck.add(cargo);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(30, 30, 30), [
                new THREE.MeshLambertMaterial({ color, flatShading: true, map: truckFrontTexture }),
                new THREE.MeshLambertMaterial({ color, flatShading: true }),
                new THREE.MeshLambertMaterial({ color, flatShading: true, map: truckLeftSideTexture }),
                new THREE.MeshLambertMaterial({ color, flatShading: true, map: truckRightSideTexture }),
                new THREE.MeshPhongMaterial({ color, flatShading: true }),
                new THREE.MeshPhongMaterial({ color, flatShading: true }),
            ]);
            cabin.position.x = 35; cabin.position.z = 20;
            cabin.castShadow = true; cabin.receiveShadow = true;
            truck.add(cabin);
            truck.add(Wheel(37)); truck.add(Wheel(5)); truck.add(Wheel(-35));
            return truck;
        }

        function Tree(tileIndex, height) {
            const tree = new THREE.Group();
            tree.position.x = tileIndex * tileSize;
            const trunk = new THREE.Mesh(
                new THREE.BoxGeometry(15, 15, 20),
                new THREE.MeshLambertMaterial({ color: 0x4d2926, flatShading: true })
            );
            trunk.position.z = 10; tree.add(trunk);
            const crown = new THREE.Mesh(
                new THREE.BoxGeometry(30, 30, height),
                new THREE.MeshLambertMaterial({ color: 0x7aa21d, flatShading: true })
            );
            crown.position.z = height / 2 + 20;
            crown.castShadow = true; crown.receiveShadow = true;
            tree.add(crown);
            return tree;
        }

        function FinishFlag(tileIndex, rowIndex) {
            const group = new THREE.Group();
            group.position.set(tileIndex * tileSize, rowIndex * tileSize, 0);
            const pole = new THREE.Mesh(
                new THREE.BoxGeometry(2, 2, 50),
                new THREE.MeshLambertMaterial({ color: 0xcccccc, flatShading: true })
            );
            pole.position.z = 25;
            group.add(pole);
            const flagShape = new THREE.Shape();
            flagShape.moveTo(0, 0);
            flagShape.lineTo(20, 10);
            flagShape.lineTo(0, 20);
            flagShape.closePath();
            const flagGeom = new THREE.ShapeGeometry(flagShape);
            const flagMat = new THREE.MeshLambertMaterial({ color: 0xffd700, side: THREE.DoubleSide, flatShading: true });
            const flag = new THREE.Mesh(flagGeom, flagMat);
            flag.position.set(2, -5, 45);
            flag.rotation.x = -Math.PI / 2;
            group.add(flag);
            return group;
        }

        function Grass(rowIndex) {
            const grass = new THREE.Group();
            grass.position.y = rowIndex * tileSize;
            const isFinish = rowIndex === FINISH_LINE_ROW;
            const middleColor = isFinish ? 0xffd700 : 0xbaf455;
            const sideColor = isFinish ? 0xdaa520 : 0x99c846;
            const createSection = (color) =>
                new THREE.Mesh(
                    new THREE.BoxGeometry(tilesPerRow * tileSize, tileSize, 3),
                    new THREE.MeshLambertMaterial({ color })
                );
            const middle = createSection(middleColor);
            middle.receiveShadow = true;
            grass.add(middle);
            const left = createSection(sideColor);
            left.position.x = -tilesPerRow * tileSize;
            grass.add(left);
            const right = createSection(sideColor);
            right.position.x = tilesPerRow * tileSize;
            grass.add(right);
            if (isFinish) {
                for (let i = minTileIndex + 1; i < maxTileIndex; i += 2) {
                    const flag = FinishFlag(i, rowIndex);
                    grass.add(flag);
                }
            }
            return grass;
        }

        function Road(rowIndex) {
            const road = new THREE.Group();
            road.position.y = rowIndex * tileSize;
            const isFinish = rowIndex === FINISH_LINE_ROW;
            const midColor = isFinish ? 0xffd700 : 0x454a59;
            const sideColor = isFinish ? 0xdaa520 : 0x393d49;
            const createSection = (color) =>
                new THREE.Mesh(
                    new THREE.PlaneGeometry(tilesPerRow * tileSize, tileSize),
                    new THREE.MeshLambertMaterial({ color })
                );
            const middle = createSection(midColor);
            middle.receiveShadow = true;
            road.add(middle);
            const left = createSection(sideColor);
            left.position.x = -tilesPerRow * tileSize;
            road.add(left);
            const right = createSection(sideColor);
            right.position.x = tilesPerRow * tileSize;
            road.add(right);
            if (isFinish) {
                for (let i = minTileIndex + 1; i < maxTileIndex; i += 2) {
                    const flag = FinishFlag(i, rowIndex);
                    road.add(flag);
                }
            }
            return road;
        }

        function DirectionalLight() {
            const dirLight = new THREE.DirectionalLight();
            dirLight.position.set(-100, -100, 200);
            dirLight.up.set(0, 0, 1);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.up.set(0, 0, 1);
            dirLight.shadow.camera.left = -400;
            dirLight.shadow.camera.right = 400;
            dirLight.shadow.camera.top = 400;
            dirLight.shadow.camera.bottom = -400;
            dirLight.shadow.camera.near = 50;
            dirLight.shadow.camera.far = 400;
            return dirLight;
        }

        // ============================================================
        // 5. توليد الخريطة (مع تجاهل خط النهاية في العوائق)
        // ============================================================
        function generateForesMetadata(rowIndex) {
            if (rowIndex === FINISH_LINE_ROW) return null;
            const occupiedTiles = new Set();
            const trees = Array.from({ length: 4 }, () => {
                let tileIndex;
                do {
                    tileIndex = THREE.MathUtils.randInt(minTileIndex, maxTileIndex);
                } while (occupiedTiles.has(tileIndex));
                occupiedTiles.add(tileIndex);
                const height = randomElement([20, 45, 60]);
                return { tileIndex, height };
            });
            return { type: "forest", trees };
        }

        function generateCarLaneMetadata(rowIndex) {
            if (rowIndex === FINISH_LINE_ROW) return null;
            const direction = randomElement([true, false]);
            const speed = randomElement([125, 156, 188]);
            const occupiedTiles = new Set();
            const vehicles = Array.from({ length: 3 }, () => {
                let initialTileIndex;
                do {
                    initialTileIndex = THREE.MathUtils.randInt(minTileIndex, maxTileIndex);
                } while (occupiedTiles.has(initialTileIndex));
                occupiedTiles.add(initialTileIndex - 1);
                occupiedTiles.add(initialTileIndex);
                occupiedTiles.add(initialTileIndex + 1);
                const color = randomElement([0xa52523, 0xbdb638, 0x78b14b]);
                return { initialTileIndex, color };
            });
            return { type: "car", direction, speed, vehicles };
        }

        function generateTruckLaneMetadata(rowIndex) {
            if (rowIndex === FINISH_LINE_ROW) return null;
            const direction = randomElement([true, false]);
            const speed = randomElement([125, 156, 188]);
            const occupiedTiles = new Set();
            const vehicles = Array.from({ length: 2 }, () => {
                let initialTileIndex;
                do {
                    initialTileIndex = THREE.MathUtils.randInt(minTileIndex, maxTileIndex);
                } while (occupiedTiles.has(initialTileIndex));
                occupiedTiles.add(initialTileIndex - 2);
                occupiedTiles.add(initialTileIndex - 1);
                occupiedTiles.add(initialTileIndex);
                occupiedTiles.add(initialTileIndex + 1);
                occupiedTiles.add(initialTileIndex + 2);
                const color = randomElement([0xa52523, 0xbdb638, 0x78b14b]);
                return { initialTileIndex, color };
            });
            return { type: "truck", direction, speed, vehicles };
        }

        function generateRow(rowIndex) {
            if (rowIndex === FINISH_LINE_ROW) {
                return { type: "finish", isFinish: true };
            }
            const type = randomElement(["car", "truck", "forest"]);
            if (type === "car") return generateCarLaneMetadata(rowIndex);
            if (type === "truck") return generateTruckLaneMetadata(rowIndex);
            return generateForesMetadata(rowIndex);
        }

        // ============================================================
        // 6. اللاعب
        // ============================================================
        function createPlayerMesh(color = 0x4db8ff) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(15, 15, 20),
                new THREE.MeshLambertMaterial({ color, flatShading: true })
            );
            body.position.z = 10; body.castShadow = true; body.receiveShadow = true;
            group.add(body);
            const cap = new THREE.Mesh(
                new THREE.BoxGeometry(2, 4, 2),
                new THREE.MeshLambertMaterial({ color: 0xf0619a, flatShading: true })
            );
            cap.position.z = 21; cap.castShadow = true; cap.receiveShadow = true;
            group.add(cap);
            const container = new THREE.Group();
            container.add(group);
            return container;
        }

        // ============================================================
        // 7. حالة اللعبة (استخدام كائن metadata)
        // ============================================================
        // تخزين بيانات الصفوف في كائن: المفتاح = رقم الصف، القيمة = بيانات الصف
        const metadata = {};
        const scene = new THREE.Scene();

        const player = createPlayerMesh(0x4db8ff);
        const playerPos = { row: 0, tile: 0 };
        const moveQueue = [];

        let remotePlayer = null;
        let remotePos = { row: 0, tile: 0, rot: 0 };

        const mapGroup = new THREE.Group();
        scene.add(mapGroup);

        const clock = new THREE.Clock();
        const moveClock = new THREE.Clock(false);

        let gameActive = true;
        let gameEnded = false;

        // ============================================================
        // 8. دوال الخريطة (معدلة للاستخدام مع الكائن)
        // ============================================================
        function initializeMap() {
            // تفريغ الخريطة
            while (mapGroup.children.length > 0) {
                mapGroup.remove(mapGroup.children[0]);
            }
            // تفريغ metadata
            for (let key in metadata) delete metadata[key];

            // نضيف صفوفاً ابتداءً من 0 إلى -9 (صفوف سالبة)
            for (let rowIndex = 0; rowIndex > -10; rowIndex--) {
                const rowData = generateRow(rowIndex);
                if (rowData) {
                    metadata[rowIndex] = rowData;
                    const rowObj = createRowObject(rowIndex, rowData);
                    if (rowObj) mapGroup.add(rowObj);
                }
            }
            // نضيف صفوفاً موجبة لتغطية بداية اللعبة
            addRows(0); // نمرر 0 لبدء الإضافة من الصف الأول الموجب
        }

        function createRowObject(rowIndex, rowData) {
            if (rowData.type === "finish" || rowData.isFinish) {
                return Road(rowIndex);
            }
            if (rowData.type === "forest") {
                const row = Grass(rowIndex);
                rowData.trees.forEach(({ tileIndex, height }) => {
                    const tree = Tree(tileIndex, height);
                    row.add(tree);
                });
                return row;
            }
            if (rowData.type === "car" || rowData.type === "truck") {
                const row = Road(rowIndex);
                rowData.vehicles.forEach((vehicle) => {
                    const veh = rowData.type === "car" ?
                        Car(vehicle.initialTileIndex, rowData.direction, vehicle.color) :
                        Truck(vehicle.initialTileIndex, rowData.direction, vehicle.color);
                    vehicle.ref = veh;
                    row.add(veh);
                });
                return row;
            }
            return null;
        }

        // إضافة صفوف جديدة ابتداءً من startRow (يجب أن يكون أكبر من أعلى صف موجود)
        function addRows(startRow) {
            // نبحث عن أعلى صف موجود حالياً
            let maxRow = -Infinity;
            for (let key in metadata) {
                const r = parseInt(key);
                if (r > maxRow) maxRow = r;
            }
            if (startRow === undefined || startRow === null) startRow = maxRow + 1;
            // نضيف 20 صفاً
            for (let i = 0; i < 20; i++) {
                const rowIndex = startRow + i;
                if (metadata[rowIndex]) continue; // تجنب التكرار
                const rowData = generateRow(rowIndex);
                if (rowData) {
                    metadata[rowIndex] = rowData;
                    const rowObj = createRowObject(rowIndex, rowData);
                    if (rowObj) mapGroup.add(rowObj);
                } else {
                    // إذا عاد null (نادراً)، نضع finish كاحتياطي
                    const fallback = { type: "finish", isFinish: true };
                    metadata[rowIndex] = fallback;
                    mapGroup.add(Road(rowIndex));
                }
            }
        }

        function initializePlayer() {
            player.position.set(0, 0, 0);
            player.children[0].position.z = 0;
            playerPos.row = 0;
            playerPos.tile = 0;
            moveQueue.length = 0;
            moveClock.stop();
            if (remotePlayer) {
                remotePlayer.position.set(0, 0, 0);
                remotePlayer.children[0].position.z = 0;
                remotePlayer.children[0].rotation.z = 0;
            }
            gameActive = true;
            gameEnded = false;
            document.getElementById('score').innerText = '0';
            document.getElementById('result-container').style.visibility = 'hidden';
        }

        // ============================================================
        // 9. منطق الحركة (مع التحقق من خط النهاية)
        // ============================================================
        function queueMove(direction) {
            if (!gameActive || gameEnded) return;
            const finalPos = calculateFinalPosition({ rowIndex: playerPos.row, tileIndex: playerPos.tile }, [...moveQueue,
                direction
            ]);
            if (finalPos.rowIndex === -1 ||
                finalPos.tileIndex === minTileIndex - 1 ||
                finalPos.tileIndex === maxTileIndex + 1
            ) return;

            // التحقق من وجود عوائق في الصف المستهدف
            const rowData = metadata[finalPos.rowIndex];
            if (rowData) {
                if (rowData.type === "forest" &&
                    rowData.trees.some(t => t.tileIndex === finalPos.tileIndex)
                ) return;
                // لا نسمح بالوقوف على خط النهاية إلا إذا وصلنا إليه (سيتم التحقق لاحقاً)
                // لكننا نسمح بالدخول إلى خط النهاية
            }

            moveQueue.push(direction);
        }

        function calculateFinalPosition(current, moves) {
            let { rowIndex, tileIndex } = current;
            moves.forEach(dir => {
                if (dir === "forward") rowIndex += 1;
                if (dir === "backward") rowIndex -= 1;
                if (dir === "left") tileIndex -= 1;
                if (dir === "right") tileIndex += 1;
            });
            return { rowIndex, tileIndex };
        }

        function stepCompleted() {
            const dir = moveQueue.shift();
            if (dir === "forward") playerPos.row += 1;
            if (dir === "backward") playerPos.row -= 1;
            if (dir === "left") playerPos.tile -= 1;
            if (dir === "right") playerPos.tile += 1;

            sounds.stepSound();

            // إضافة صفوف جديدة إذا اقترب اللاعب من نهاية الخريطة
            const maxRow = Math.max(...Object.keys(metadata).map(Number));
            if (playerPos.row > maxRow - 5) {
                addRows(maxRow + 1);
            }

            const scoreEl = document.getElementById('score');
            scoreEl.innerText = playerPos.row.toString();

            if (conn && conn.open) {
                conn.send({
                    type: 'move',
                    row: playerPos.row,
                    tile: playerPos.tile,
                    rot: player.children[0].rotation.z
                });
            }

            // التحقق من الوصول إلى خط النهاية
            if (playerPos.row >= FINISH_LINE_ROW && !gameEnded) {
                gameEnded = true;
                gameActive = false;
                sounds.winSound();
                if (conn && conn.open) {
                    conn.send({ type: 'win', score: playerPos.row });
                }
                showEndScreen(true, playerPos.row);
            }
        }

        function animatePlayer() {
            if (!moveQueue.length || !gameActive) return;
            if (!moveClock.running) moveClock.start();

            const stepTime = 0.2;
            const progress = Math.min(1, moveClock.getElapsedTime() / stepTime);

            const startX = playerPos.tile * tileSize;
            const startY = playerPos.row * tileSize;
            let endX = startX,
                endY = startY;
            let endRot = 0;

            if (moveQueue[0] === "left") { endX -= tileSize;
                endRot = Math.PI / 2; }
            if (moveQueue[0] === "right") { endX += tileSize;
                endRot = -Math.PI / 2; }
            if (moveQueue[0] === "forward") { endY += tileSize;
                endRot = 0; }
            if (moveQueue[0] === "backward") { endY -= tileSize;
                endRot = Math.PI; }

            player.position.x = THREE.MathUtils.lerp(startX, endX, progress);
            player.position.y = THREE.MathUtils.lerp(startY, endY, progress);
            player.children[0].position.z = Math.sin(progress * Math.PI) * 8;
            player.children[0].rotation.z = THREE.MathUtils.lerp(
                player.children[0].rotation.z, endRot, progress
            );

            if (progress >= 1) {
                stepCompleted();
                moveClock.stop();
            }
        }

        // ============================================================
        // 10. المركبات والتصادم (معدل للاستخدام مع كائن metadata)
        // ============================================================
        function animateVehicles() {
            const delta = clock.getDelta();
            for (let rowKey in metadata) {
                const rowData = metadata[rowKey];
                if ((rowData.type === "car" || rowData.type === "truck") && rowData.vehicles) {
                    const beginning = (minTileIndex - 2) * tileSize;
                    const end = (maxTileIndex + 2) * tileSize;
                    rowData.vehicles.forEach(({ ref }) => {
                        if (!ref) return;
                        if (rowData.direction) {
                            ref.position.x = ref.position.x > end ? beginning : ref.position.x + rowData
                            .speed * delta;
                        } else {
                            ref.position.x = ref.position.x < beginning ? end : ref.position.x - rowData
                            .speed * delta;
                        }
                    });
                }
            }
        }

        function hitTest() {
            if (!gameActive) return;
            const rowData = metadata[playerPos.row]; // اللاعب موجود في هذا الصف
            if (!rowData) return;
            if (rowData.type === "car" || rowData.type === "truck") {
                const playerBox = new THREE.Box3().setFromObject(player);
                rowData.vehicles.forEach(({ ref }) => {
                    if (!ref) return;
                    const vehBox = new THREE.Box3().setFromObject(ref);
                    if (playerBox.intersectsBox(vehBox)) {
                        gameActive = false;
                        gameEnded = true;
                        sounds.crashSound();
                        if (conn && conn.open) {
                            conn.send({ type: 'crash' });
                        }
                        showEndScreen(false, playerPos.row);
                    }
                });
            }
        }

        // ============================================================
        // 11. شاشة النهاية
        // ============================================================
        const resultContainer = document.getElementById('result-container');
        const resultTitle = document.getElementById('resultTitle');
        const resultMsg = document.getElementById('resultMsg');

        function showEndScreen(isWinner, score) {
            resultContainer.style.visibility = 'visible';
            if (isWinner) {
                resultTitle.innerText = '🏆 لقد وصلت إلى خط النهاية!';
                resultTitle.style.color = '#2e7d32';
                resultMsg.innerText = `وصلت إلى الصف ${score} وفزت بالسباق!`;
            } else {
                resultTitle.innerText = '💔 لقد خسرت!';
                resultTitle.style.color = '#c62828';
                if (score >= FINISH_LINE_ROW) {
                    resultMsg.innerText = `الخصم وصل إلى خط النهاية قبلك.`;
                } else {
                    resultMsg.innerText = `اصطدمت بسيارة في الصف ${score}.`;
                }
            }
        }

        // ============================================================
        // 12. إعداد المشهد
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        const camera = Camera();
        player.add(camera);

        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const dirLight = DirectionalLight();
        dirLight.target = player;
        player.add(dirLight);

        scene.add(player);
        player.position.set(0, 0, 0);

        initializeMap();
        initializePlayer();

        // ============================================================
        // 13. الاتصال والصوت (نفس الكود السابق مع تعديلات طفيفة)
        // ============================================================
        const statusMsg = document.getElementById('statusMsg');
        const roleBadge = document.getElementById('role-badge');
        const micToggleBtn = document.getElementById('micToggleBtn');
        const micIndicator = document.getElementById('micIndicator');

        let peer = null;
        let conn = null;
        let isHost = false;
        let localStream = null;
        let mediaConn = null;
        let isMicActive = false;

        function updateStatus(msg) { statusMsg.textContent = msg; }
        function setRole(text, cls) {
            roleBadge.textContent = text;
            roleBadge.className = cls;
            roleBadge.style.display = 'inline-block';
        }

        function createRemotePlayer() {
            if (remotePlayer) { scene.remove(remotePlayer); }
            remotePlayer = createPlayerMesh(0xff4444);
            remotePlayer.position.set(0, 0, 0);
            scene.add(remotePlayer);
        }

        async function enableMic() {
            try {
                if (localStream) {
                    const tracks = localStream.getAudioTracks();
                    if (tracks.length > 0) {
                        const enabled = !tracks[0].enabled;
                        tracks[0].enabled = enabled;
                        isMicActive = enabled;
                        micToggleBtn.textContent = enabled ? '🎤 كتم الصوت' : '🎤 إلغاء الكتم';
                        micToggleBtn.className = enabled ? '' : 'muted';
                        micIndicator.className = 'mic-indicator' + (enabled ? '' : ' off');
                        return;
                    }
                }
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                localStream = stream;
                isMicActive = true;
                micToggleBtn.textContent = '🎤 كتم الصوت';
                micToggleBtn.className = '';
                micIndicator.className = 'mic-indicator';
                if (conn && conn.open && !mediaConn) {
                    startAudioCall();
                }
                updateStatus('🎤 الميكروفون جاهز');
            } catch (err) {
                updateStatus('⚠️ لا يمكن الوصول للميكروفون: ' + err.message);
                micToggleBtn.disabled = true;
            }
        }

        function startAudioCall() {
            if (!localStream || !conn || !conn.open || mediaConn) return;
            if (peer) {
                mediaConn = peer.call(conn.peer, localStream);
                setupMediaConnection(mediaConn);
            }
        }

        function setupMediaConnection(mc) {
            mc.on('stream', (remoteStream) => {
                const audioEl = new Audio();
                audioEl.srcObject = remoteStream;
                audioEl.autoplay = true;
                audioEl.play().catch(e => console.warn('تشغيل الصوت:', e));
                updateStatus('🔊 الصوت متصل');
            });
            mc.on('close', () => {
                updateStatus('🔇 انقطع الصوت');
                mediaConn = null;
            });
        }

        function setupConnection(connection) {
            conn = connection;
            conn.on('open', () => {
                updateStatus('✅ متصل باللاعب الآخر!');
                if (isHost) {
                    setRole('🏁 أنت (المضيف)', 'harer');
                    conn.send({ type: 'init', role: 'guest' });
                } else {
                    setRole('🏁 أنت (الضيف)', 'police');
                }
                createRemotePlayer();
                if (localStream && !mediaConn) {
                    startAudioCall();
                }
                if (conn.open) {
                    conn.send({
                        type: 'move',
                        row: playerPos.row,
                        tile: playerPos.tile,
                        rot: player.children[0].rotation.z
                    });
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'move') {
                    if (remotePlayer) {
                        remotePos.row = data.row;
                        remotePos.tile = data.tile;
                        remotePos.rot = data.rot || 0;
                        remotePlayer.position.x = data.tile * tileSize;
                        remotePlayer.position.y = data.row * tileSize;
                        remotePlayer.children[0].rotation.z = data.rot || 0;
                    }
                } else if (data.type === 'init') {
                    if (!isHost) {
                        setRole('🏁 أنت (الضيف)', 'police');
                        createRemotePlayer();
                    }
                } else if (data.type === 'win') {
                    gameActive = false;
                    gameEnded = true;
                    sounds.loseSound();
                    showEndScreen(false, data.score);
                } else if (data.type === 'crash') {
                    gameActive = false;
                    gameEnded = true;
                    sounds.winSound();
                    showEndScreen(true, playerPos.row);
                } else if (data.type === 'restart') {
                    if (!gameActive) {
                        restartGame();
                    }
                }
            });

            conn.on('close', () => {
                updateStatus('⚠️ انقطع الاتصال.');
                setRole('⏳ قطع الاتصال', 'waiting');
                if (remotePlayer) {
                    scene.remove(remotePlayer);
                    remotePlayer = null;
                }
                if (mediaConn) {
                    mediaConn.close();
                    mediaConn = null;
                }
            });
        }

        // ============================================================
        // 14. أزرار الواجهة
        // ============================================================
        document.getElementById('createRoomBtn').addEventListener('click', () => {
            if (peer) { peer.destroy();
                peer = null;
                conn = null; }
            const roomId = 'room-' + Math.random().toString(36).substr(2, 6);
            isHost = true;
            peer = new Peer(roomId, { debug: 2 });
            document.getElementById('roomInput').value = roomId;

            peer.on('open', (id) => {
                updateStatus(`✅ الغرفة جاهزة: ${id}`);
                setRole('⏳ انتظر الخصم...', 'waiting');
                document.getElementById('createRoomBtn').disabled = true;
                document.getElementById('joinRoomBtn').disabled = true;
            });

            peer.on('connection', (conn) => {
                updateStatus('🔗 لاعب آخر انضم!');
                setRole('🏁 أنت (المضيف)', 'harer');
                setupConnection(conn);
                createRemotePlayer();
            });

            peer.on('error', (err) => {
                updateStatus('❌ خطأ: ' + err.message);
                console.error(err);
            });
        });

        document.getElementById('joinRoomBtn').addEventListener('click', () => {
            const roomId = document.getElementById('roomInput').value.trim();
            if (!roomId) {
                updateStatus('⚠️ أدخل معرف الغرفة');
                return;
            }
            if (peer) { peer.destroy();
                peer = null;
                conn = null; }
            isHost = false;
            peer = new Peer({ debug: 2 });

            peer.on('open', (id) => {
                updateStatus(`🔗 جارِ الاتصال بـ ${roomId}...`);
                const connection = peer.connect(roomId);
                setupConnection(connection);
                document.getElementById('createRoomBtn').disabled = true;
                document.getElementById('joinRoomBtn').disabled = true;
                setRole('⏳ جارِ التحميل...', 'waiting');
            });

            peer.on('error', (err) => {
                updateStatus('❌ خطأ: ' + err.message);
                console.error(err);
            });
        });

        document.getElementById('closePanelBtn').addEventListener('click', () => {
            document.getElementById('connection-panel').classList.add('hidden');
            document.getElementById('showPanelBtn').style.display = 'block';
        });

        document.getElementById('showPanelBtn').addEventListener('click', () => {
            document.getElementById('connection-panel').classList.remove('hidden');
            document.getElementById('showPanelBtn').style.display = 'none';
        });

        micToggleBtn.addEventListener('click', enableMic);

        // ============================================================
        // 15. التحكم وإعادة التشغيل
        // ============================================================
        document.getElementById('forward').addEventListener('click', () => queueMove('forward'));
        document.getElementById('backward').addEventListener('click', () => queueMove('backward'));
        document.getElementById('left').addEventListener('click', () => queueMove('left'));
        document.getElementById('right').addEventListener('click', () => queueMove('right'));

        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                e.preventDefault();
            }
            if (key === 'ArrowUp') queueMove('forward');
            if (key === 'ArrowDown') queueMove('backward');
            if (key === 'ArrowLeft') queueMove('left');
            if (key === 'ArrowRight') queueMove('right');
        });

        document.getElementById('retry').addEventListener('click', restartGame);

        function restartGame() {
            initializePlayer();
            initializeMap();
            if (remotePlayer) {
                remotePlayer.position.set(0, 0, 0);
                remotePlayer.children[0].rotation.z = 0;
            }
            if (conn && conn.open) {
                conn.send({ type: 'restart' });
            }
        }

        // ============================================================
        // 16. تغيير الحجم
        // ============================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            renderer.setSize(w, h);
            const viewRatio = w / h;
            const size = 300;
            const width = viewRatio < 1 ? size : size * viewRatio;
            const height = viewRatio < 1 ? size / viewRatio : size;
            camera.left = -width / 2;
            camera.right = width / 2;
            camera.top = height / 2;
            camera.bottom = -height / 2;
            camera.updateProjectionMatrix();
        });

        // ============================================================
        // 17. حلقة اللعبة
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);
            if (gameActive) {
                animateVehicles();
                animatePlayer();
                hitTest();
            }
            renderer.render(scene, camera);
        }
        animate();

        // ============================================================
        // 18. رسالة البداية
        // ============================================================
        updateStatus('🚀 أنشئ غرفة أو انضم');
        setRole('⏳ انتظر', 'waiting');
        console.log('🏁 سباق خط النهاية – مع أصوات!');
    </script>
</body>
</html>
